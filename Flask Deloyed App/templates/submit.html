<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ title }}</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 bg-emerald-50/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center px-12 py-6 max-w-screen-2xl mx-auto">

    <div class="text-2xl font-serif font-bold text-emerald-950">
      LeafSense AI
    </div>

    <nav class="hidden md:flex items-center gap-8 font-serif italic">

      <a href="{{ url_for('home_page') }}" class="text-emerald-700 hover:text-emerald-900">
        Home
      </a>

      <a href="{{ url_for('ai_engine_page') }}" class="text-emerald-900 border-b-2 border-emerald-900 pb-1">
        Diagnostics
      </a>

      <a href="{{ url_for('market') }}" class="text-emerald-700 hover:text-emerald-900">
        Supplements
      </a>

    </nav>

  </div>
</header>

<!-- MAIN CONTENT -->
<main class="mt-28">

  <!-- HERO -->
  <section class="px-10 py-10 max-w-7xl mx-auto">
    <div class="flex flex-col lg:flex-row gap-10">

      <!-- IMAGE -->
      <div class="lg:w-2/3">
        <img src="{{ image_url }}" class="w-full h-[400px] object-cover rounded-xl shadow">
      </div>

      <!-- TITLE + RESULT -->
      <div class="lg:w-1/3 space-y-6">

        <h1 class="text-4xl font-bold text-green-800">
          {{ title }}
        </h1>

        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-red-600 font-bold text-lg">AI Diagnosis</h3>
          <p class="text-gray-600 mt-2">
            {{ desc }}
          </p>
        </div>

      </div>

    </div>
  </section>

  <!-- DETAILS -->
  <section class="bg-white py-16 px-10">
    <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-10">

      <!-- DESCRIPTION -->
      <div>
        <h3 class="font-bold text-xl mb-4">Description</h3>
        <p class="text-gray-600">{{ desc }}</p>
      </div>

      <!-- PREVENTION -->
      <div>
        <h3 class="font-bold text-xl mb-4">Prevention</h3>
        <p class="text-gray-600">{{ prevent }}</p>
      </div>

      <!-- SUPPLEMENTS -->
      <div class="text-center">

        <h3 class="font-bold text-xl mb-4">Supplements</h3>

        {% if simage %}
          <img src="{{ simage }}" class="w-full h-48 object-cover rounded mb-4">
          <h5 class="font-semibold">{{ sname }}</h5>

          <a href="{{ buy_link }}" target="_blank"
             class="inline-block mt-4 px-6 py-2 bg-green-700 text-white rounded-lg hover:bg-green-800">
             Buy Product
          </a>
        {% else %}
          <p class="text-gray-400">No supplement available</p>
        {% endif %}

      </div>

    </div>
  </section>

</main>

<!-- FOOTER -->
<footer class="w-full py-4 bg-emerald-100 text-center text-sm text-emerald-900">
  © LeafSense AI
</footer>

</body>
</html>
